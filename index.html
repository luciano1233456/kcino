<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎰 ROYAL CASINO - Ranking Online</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{min-height:100vh;background:linear-gradient(135deg,#0a4a2a,#062a12);font-family:'Segoe UI',Arial,sans-serif;padding:20px;}
        .game-container{max-width:1400px;margin:0 auto;background:rgba(0,0,0,0.85);border-radius:30px;padding:25px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
        .casino-title{text-align:center;font-size:48px;font-weight:bold;background:linear-gradient(135deg,#ffd700,#ffaa00);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:5px;}
        .casino-sub{text-align:center;color:#aaa;margin-bottom:20px;}
        .online-badge{background:#44ff44;color:#000;display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;margin-left:10px;}

        .account-system{background:linear-gradient(135deg,#1a1a2e,#0a0a1a);border-radius:20px;padding:20px;margin-bottom:25px;border:2px solid #ffd700;}
        .account-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;}
        .player-info{display:flex;align-items:center;gap:15px;}
        .player-avatar{width:50px;height:50px;background:#ffd700;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;}
        .player-details h3{color:#ffd700;margin-bottom:5px;}
        .player-details p{color:#aaa;font-size:12px;}
        .auth-buttons{display:flex;gap:10px;}
        .auth-btn{background:#ffd700;color:#000;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-weight:bold;}
        .auth-btn.logout{background:#ff4444;color:#fff;}
        .auth-btn:hover{transform:scale(1.05);}

        .ranking-section{background:#0a0a0a;border-radius:15px;padding:20px;margin-top:20px;border:1px solid #ffd700;}
        .ranking-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #333;}
        .ranking-item .rank{color:#ffd700;width:50px;}
        .ranking-item .name{flex:1;text-align:left;}
        .ranking-item .score{color:#44ff44;font-weight:bold;margin-left:10px;}

        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:15px;margin:20px 0;}
        .stat-card{background:linear-gradient(135deg,#1a1a2e,#0a0a1a);border-radius:15px;padding:15px;text-align:center;border:1px solid #ffd700;}
        .stat-label{font-size:12px;color:#ffd700;}
        .stat-value{font-size:28px;font-weight:bold;color:white;}

        .main-game{display:grid;grid-template-columns:1fr 1.2fr;gap:25px;}
        @media (max-width:768px){.main-game{grid-template-columns:1fr;}}
        .roulette-section{background:#0a0a0a;border-radius:20px;padding:20px;border:2px solid #ffd700;text-align:center;}
        canvas{width:100%!important;max-width:450px;height:auto!important;margin:0 auto;display:block;border-radius:50%;cursor:pointer;background:#1a1a1a;}
        .betting-section{background:#0a3a1a;border-radius:20px;padding:20px;border:2px solid #ffd700;}
        .bet-amount-control{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
        .bet-input{background:#1a1a1a;border:2px solid #ffd700;color:#ffd700;padding:10px;width:130px;border-radius:10px;text-align:center;font-weight:bold;}
        .quick-btn{background:#333;color:#ffd700;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;}
        .numbers-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:5px;margin-bottom:10px;}
        .number-btn{aspect-ratio:1;border:none;border-radius:8px;font-weight:bold;cursor:pointer;color:white;font-size:12px;}
        .number-btn.red{background:#cc0000;}
        .number-btn.black{background:#111;}
        .number-btn.green{background:#008800;}
        .number-btn.selected{box-shadow:0 0 0 3px #ffd700;transform:scale(1.02);}
        .special-bets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:15px;}
        .special-btn{background:#1a1a1a;color:#ffd700;border:1px solid #ffd700;padding:8px;border-radius:8px;cursor:pointer;font-size:11px;}
        .special-btn.selected{background:#ffd700;color:#000;}
        .spin-btn{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;border:none;padding:15px;font-size:20px;font-weight:bold;border-radius:50px;cursor:pointer;width:100%;margin-top:15px;}
        .investments-section{margin-top:25px;background:#0a0a0a;border-radius:15px;padding:20px;border:1px solid #44ff44;}
        .investment-item{background:#1a1a1a;border-radius:10px;padding:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
        .event-panel{background:linear-gradient(135deg,#2a1a3a,#1a0a2a);border-radius:15px;padding:15px;margin-top:20px;text-align:center;border:1px solid #ff44ff;color:#ff88ff;}
        .history-panel{margin-top:20px;background:#0a0a0a;border-radius:15px;padding:15px;max-height:200px;overflow-y:auto;}
        .history-item{padding:5px 10px;margin:5px 0;border-left:3px solid;font-size:12px;}
        .notification{position:fixed;top:20px;right:20px;background:rgba(0,0,0,0.95);color:#ffd700;padding:15px 25px;border-radius:10px;border-left:4px solid #ffd700;z-index:1000;animation:slideIn 0.3s;}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:1000;}
        .modal-content{background:#1a1a1a;padding:30px;border-radius:20px;border:2px solid #ffd700;max-width:400px;width:90%;}
        .modal-content h2{color:#ffd700;margin-bottom:20px;}
        .modal-content input{width:100%;padding:12px;margin:10px 0;background:#333;border:1px solid #ffd700;color:#fff;border-radius:8px;}
        .modal-content button{width:100%;padding:12px;background:#ffd700;color:#000;border:none;border-radius:8px;cursor:pointer;margin-top:10px;font-weight:bold;}
        button{cursor:pointer;transition:all 0.2s;}
        button:hover{transform:scale(1.02);}
        .roulette-info{margin-top:15px;color:#ffd700;}
        #lastNumber span{display:inline-block;padding:5px 15px;border-radius:20px;}
    </style>
</head>
<body>
<div class="game-container">
    <div class="casino-title">🎰 ROYAL CASINO 🎰 <span class="online-badge">🌍 ONLINE</span></div>
    <div class="casino-sub">Ranking Mundial - Conéctate y compite</div>
    
    <div class="account-system">
        <div class="account-header">
            <div class="player-info">
                <div class="player-avatar" id="playerAvatar">👤</div>
                <div class="player-details">
                    <h3 id="playerName">Desconectado</h3>
                    <p id="playerLevel">🌐 Conectando al servidor...</p>
                </div>
            </div>
            <div class="auth-buttons">
                <button class="auth-btn" id="loginBtn" onclick="showLoginModal()">🔐 INICIAR SESIÓN</button>
                <button class="auth-btn" id="registerBtn" onclick="showRegisterModal()">📝 REGISTRARSE</button>
                <button class="auth-btn logout" id="logoutBtn" onclick="logout()" style="display:none;">🚪 SALIR</button>
            </div>
        </div>
    </div>
    
    <div class="ranking-section">
        <h3 style="color:#ffd700;">🌍 RANKING MUNDIAL 🌍</h3>
        <div id="rankingStatus" style="font-size:12px; color:#aaa; margin-bottom:10px;">🔄 Cargando ranking...</div>
        <div id="rankingList"></div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">💰 DINERO</div><div class="stat-value" id="money">$5,000</div></div>
        <div class="stat-card"><div class="stat-label">🎲 RACHA</div><div class="stat-value" id="streak">0</div></div>
        <div class="stat-card"><div class="stat-label">🏆 MEJOR GANANCIA</div><div class="stat-value" id="bestWin">$0</div></div>
        <div class="stat-card"><div class="stat-label">🎰 TIROS</div><div class="stat-value" id="totalSpins">0</div></div>
    </div>
    
    <div class="main-game">
        <div class="roulette-section">
            <canvas id="rouletteCanvas" width="500" height="500"></canvas>
            <div class="roulette-info">Último número: <span id="lastNumber">—</span></div>
        </div>
        <div class="betting-section">
            <div class="bet-amount-control">
                <input type="number" id="betAmount" class="bet-input" value="100" step="50" min="10" max="10000">
                <div class="quick-bets">
                    <button class="quick-btn" onclick="setQuickBet(50)">+$50</button>
                    <button class="quick-btn" onclick="setQuickBet(100)">+$100</button>
                    <button class="quick-btn" onclick="setQuickBet(500)">+$500</button>
                    <button class="quick-btn" onclick="setQuickBet(1000)">+$1000</button>
                </div>
            </div>
            <div class="betting-board">
                <div class="numbers-grid" id="numbersGrid"></div>
                <div class="special-bets">
                    <button class="special-btn" data-bet="red">🔴 ROJO (x2)</button>
                    <button class="special-btn" data-bet="black">⚫ NEGRO (x2)</button>
                    <button class="special-btn" data-bet="even">✅ PAR (x2)</button>
                    <button class="special-btn" data-bet="odd">❌ IMPAR (x2)</button>
                    <button class="special-btn" data-bet="1-18">1-18 (x2)</button>
                    <button class="special-btn" data-bet="19-36">19-36 (x2)</button>
                    <button class="special-btn" data-bet="dozen1">1RA DOCENA (x3)</button>
                    <button class="special-btn" data-bet="dozen2">2DA DOCENA (x3)</button>
                    <button class="special-btn" data-bet="dozen3">3RA DOCENA (x3)</button>
                </div>
            </div>
            <button class="spin-btn" id="spinBtn">🎲 GIRAR RULETA</button>
        </div>
    </div>
    
    <div class="investments-section">
        <h3 style="color:#44ff44;">📈 INVERSIONES PASIVAS</h3>
        <div id="investments"></div>
    </div>
    
    <div class="event-panel">
        🎲 Evento aleatorio en: <span id="eventTimer">15</span> segundos
    </div>
    
    <div class="history-panel">
        <h4 style="color:#ffd700;">📜 HISTORIAL</h4>
        <div id="history"></div>
    </div>
</div>

<script>
// ========== CONFIGURACIÓN - ¡REEMPLAZA CON TU URL DE GOOGLE APPS SCRIPT! ==========
const GAS_URL = "https://script.google.com/macros/s/AKfycbybxaCriQ7ICk2UolwxVwvYsEavZeg6V9i-TUN7y5-5wk6_i-s-5_hxzxh7WER_l9CZ/exec";

// Esperar a que la página cargue completamente
window.addEventListener('load', function() {
    console.log("Página cargada, iniciando juego...");
    initGame();
});

// ========== VARIABLES GLOBALES ==========
let currentUser = null;
let autoSaveInterval = null;

// Validar números
function validarNumero(valor, defecto = 5000, min = 0, max = 100000) {
    let num = Number(valor);
    if (isNaN(num) || !isFinite(num) || num < min) num = defecto;
    if (num > max) num = max;
    return Math.floor(num);
}

// ========== FUNCIONES API PARA GOOGLE SHEETS ==========
async function callApi(data) {
    try {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const text = await response.text();
        return JSON.parse(text);
    } catch(error) {
        console.error('Error API:', error);
        return { success: false, error: error.message };
    }
}

async function fetchRanking() {
    try {
        const response = await fetch(GAS_URL + "?t=" + Date.now(), { method: 'GET' });
        const data = await response.json();
        if (!Array.isArray(data)) return [];
        return data.map(p => ({
            username: p.username,
            money: validarNumero(p.money, 5000),
            bestWin: validarNumero(p.bestWin, 0),
            totalSpins: validarNumero(p.totalSpins, 0),
            totalWins: validarNumero(p.totalWins, 0),
            level: validarNumero(p.level, 1)
        }));
    } catch(error) {
        console.error("Error ranking:", error);
        return [];
    }
}

// ========== FUNCIONES LOGIN/REGISTRO ==========
async function login(username, password) {
    const result = await callApi({ action: 'login', username, password });
    if (result.success && result.user) {
        currentUser = username;
        money = validarNumero(result.user.money, 5000);
        bestWin = validarNumero(result.user.bestWin, 0);
        totalSpins = validarNumero(result.user.totalSpins, 0);
        totalWins = validarNumero(result.user.totalWins, 0);
        streak = validarNumero(result.user.streak, 0);
        
        updateUI();
        updateUIBasedOnUser();
        showNotification(`🎉 ¡Bienvenido ${username}!`, true);
        
        if (autoSaveInterval) clearInterval(autoSaveInterval);
        autoSaveInterval = setInterval(() => saveOnline(), 30000);
        saveOnline();
        
        return true;
    }
    showNotification("❌ Usuario o contraseña incorrectos", false);
    return false;
}

async function register(username, password) {
    if (username.length < 3) { showNotification("❌ Usuario mínimo 3 caracteres", false); return false; }
    if (password.length < 3) { showNotification("❌ Contraseña mínimo 3 caracteres", false); return false; }
    
    const result = await callApi({ 
        action: 'register', 
        username, 
        password, 
        money: 5000,
        bestWin: 0,
        totalSpins: 0,
        totalWins: 0,
        level: 1,
        streak: 0
    });
    
    if (result.success) {
        showNotification("✅ ¡Registro exitoso! Ahora inicia sesión", true);
        return true;
    } else {
        showNotification("❌ El usuario ya existe", false);
        return false;
    }
}

async function saveOnline() {
    if (!currentUser) return;
    const result = await callApi({
        action: 'save',
        username: currentUser,
        money: validarNumero(money, 5000),
        bestWin: validarNumero(bestWin, 0),
        totalSpins: validarNumero(totalSpins, 0),
        totalWins: validarNumero(totalWins, 0),
        level: Math.floor((bestWin + totalWins) / 5000) + 1,
        streak: validarNumero(streak, 0)
    });
    if (result.success) console.log("✅ Guardado en la nube");
}

async function updateRankingUI() {
    const players = await fetchRanking();
    const ranking = players.sort((a,b) => (b.bestWin || 0) - (a.bestWin || 0)).slice(0, 15);
    
    const rankingHTML = ranking.map((player, idx) => `
        <div class="ranking-item">
            <span class="rank">${idx === 0 ? '👑' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx+1}`}</span>
            <span class="name">🎲 ${player.username} ${player.username === currentUser ? '(tú)' : ''}</span>
            <span class="score">💰 $${(player.bestWin || 0).toLocaleString()}</span>
            <span class="score">🎯 Nv.${player.level || 1}</span>
        </div>
    `).join('');
    
    document.getElementById('rankingList').innerHTML = rankingHTML || '<div style="text-align:center;padding:20px;">Aún no hay jugadores</div>';
    document.getElementById('rankingStatus').innerHTML = `✅ ${players.length} jugadores en el ranking mundial`;
}

function logout() {
    if (currentUser && autoSaveInterval) {
        saveOnline();
        clearInterval(autoSaveInterval);
    }
    currentUser = null;
    resetToGuest();
    updateUIBasedOnUser();
    showNotification("👋 Has cerrado sesión", true);
}

function updateUIBasedOnUser() {
    if (currentUser) {
        document.getElementById('playerName').innerHTML = `🎲 ${currentUser}`;
        document.getElementById('playerLevel').innerHTML = `🌍 ONLINE | Nivel: ${Math.floor((bestWin + totalWins) / 5000) + 1} | Victorias: ${totalWins}`;
        document.getElementById('playerAvatar').innerHTML = '🎲';
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('registerBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'block';
    } else {
        document.getElementById('playerName').innerHTML = '👤 Invitado';
        document.getElementById('playerLevel').innerHTML = '🌍 Conéctate para guardar tu progreso online';
        document.getElementById('playerAvatar').innerHTML = '👤';
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('registerBtn').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'none';
    }
}

function resetToGuest() {
    money = 5000;
    streak = 0;
    bestWin = 0;
    totalSpins = 0;
    totalWins = 0;
    investments = [
        { name: "🏪 Tienda Local", cost: 1000, invested: 0, earned: 0, rate: 0.02, lastCollect: Date.now() },
        { name: "🏭 Fábrica Digital", cost: 5000, invested: 0, earned: 0, rate: 0.05, lastCollect: Date.now() },
        { name: "🏢 Holding Corp", cost: 20000, invested: 0, earned: 0, rate: 0.12, lastCollect: Date.now() }
    ];
    updateUI();
}

// ========== MODALES ==========
function showLoginModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
        <div class="modal-content">
            <h2>🔐 INICIAR SESIÓN ONLINE</h2>
            <input type="text" id="loginUsername" placeholder="Usuario" autocomplete="off">
            <input type="password" id="loginPassword" placeholder="Contraseña">
            <button onclick="performLogin()">Ingresar</button>
            <button onclick="this.closest('.modal').remove()" style="background:#333;">Cancelar</button>
        </div>
    `;
    document.body.appendChild(modal);
}

function showRegisterModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
        <div class="modal-content">
            <h2>📝 REGISTRO ONLINE</h2>
            <input type="text" id="regUsername" placeholder="Usuario (mínimo 3 caracteres)" autocomplete="off">
            <input type="password" id="regPassword" placeholder="Contraseña (mínimo 3 caracteres)">
            <input type="password" id="regConfirm" placeholder="Confirmar contraseña">
            <button onclick="performRegister()">Registrarse</button>
            <button onclick="this.closest('.modal').remove()" style="background:#333;">Cancelar</button>
        </div>
    `;
    document.body.appendChild(modal);
}

async function performLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (await login(username, password)) {
        document.querySelector('.modal')?.remove();
        await updateRankingUI();
    }
}

async function performRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    if (password !== confirm) {
        showNotification("❌ Las contraseñas no coinciden", false);
        return;
    }
    if (await register(username, password)) {
        document.querySelector('.modal')?.remove();
    }
}

// ========== LÓGICA DE LA RULETA ==========
const rouletteNumbers = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];

function getNumberColor(num) {
    if (num === 0) return 'green';
    const reds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    return reds.includes(num) ? 'red' : 'black';
}

let money = 5000, streak = 0, bestWin = 0, totalSpins = 0, totalWins = 0;
let spinning = false, currentBet = null, lastNumber = null, history = [], spinAngle = 0;
let canvas, ctx;

let investments = [
    { name: "🏪 Tienda Local", cost: 1000, invested: 0, earned: 0, rate: 0.02, lastCollect: Date.now() },
    { name: "🏭 Fábrica Digital", cost: 5000, invested: 0, earned: 0, rate: 0.05, lastCollect: Date.now() },
    { name: "🏢 Holding Corp", cost: 20000, invested: 0, earned: 0, rate: 0.12, lastCollect: Date.now() }
];

let eventTimer = 15;

function updateUI() {
    money = validarNumero(money, 5000);
    streak = validarNumero(streak, 0);
    bestWin = validarNumero(bestWin, 0);
    totalSpins = validarNumero(totalSpins, 0);
    totalWins = validarNumero(totalWins, 0);
    
    const moneyEl = document.getElementById('money');
    if (moneyEl) moneyEl.innerHTML = `$${Math.floor(money).toLocaleString()}`;
    const streakEl = document.getElementById('streak');
    if (streakEl) streakEl.innerHTML = streak;
    const bestWinEl = document.getElementById('bestWin');
    if (bestWinEl) bestWinEl.innerHTML = `$${bestWin.toLocaleString()}`;
    const totalSpinsEl = document.getElementById('totalSpins');
    if (totalSpinsEl) totalSpinsEl.innerHTML = totalSpins;
    
    const investDiv = document.getElementById('investments');
    if (investDiv) {
        investDiv.innerHTML = investments.map((inv, i) => `
            <div class="investment-item">
                <div><strong style="color:#44ff44">${inv.name}</strong><br><small>Invertido: $${Math.floor(inv.invested)} | Ganado: $${Math.floor(inv.earned)}</small></div>
                <div>
                    <button onclick="investInBusiness(${i})" style="background:#44ff44;border:none;padding:5px 15px;border-radius:5px;cursor:pointer">INVERTIR $${inv.cost}</button>
                    <button onclick="collectBusiness(${i})" style="background:#ffd700;border:none;padding:5px 15px;border-radius:5px;margin-left:5px;cursor:pointer" ${inv.earned < 10 ? 'disabled' : ''}>COBRAR $${Math.floor(inv.earned)}</button>
                </div>
            </div>
        `).join('');
    }
}

function addHistory(text, type) {
    history.unshift({ text, type, time: new Date().toLocaleTimeString() });
    if (history.length > 15) history.pop();
    const historyDiv = document.getElementById('history');
    if (historyDiv) {
        historyDiv.innerHTML = history.map(h => `
            <div class="history-item" style="border-left-color: ${h.type === 'win' ? '#44ff44' : h.type === 'loss' ? '#ff4444' : '#ff44ff'}">
                [${h.time}] ${h.text}
            </div>
        `).join('');
    }
}

function showNotification(msg, isWin) {
    const n = document.createElement('div');
    n.className = 'notification';
    n.innerHTML = isWin ? `🎉 ${msg} 🎉` : `😰 ${msg} 😰`;
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 3000);
}

function setQuickBet(amount) { 
    const betInput = document.getElementById('betAmount');
    if (betInput) betInput.value = Math.min(amount, money);
}

function formatBetType(t, v) {
    const types = { 'number': `Número ${v}`, 'red': 'Rojo', 'black': 'Negro', 'even': 'Par', 'odd': 'Impar', '1-18': '1-18', '19-36': '19-36', 'dozen1': '1ra Docena', 'dozen2': '2da Docena', 'dozen3': '3ra Docena' };
    return types[t] || t;
}

function placeBet(t, v = null) {
    let a = parseInt(document.getElementById('betAmount').value);
    if (isNaN(a) || a <= 0) { showNotification("Cantidad inválida", false); return false; }
    if (a > money) { showNotification("No tienes suficiente dinero", false); return false; }
    
    a = Math.min(a, 10000);
    document.getElementById('betAmount').value = a;
    
    currentBet = { type: t, value: v, amount: a };
    document.querySelectorAll('.special-btn, .number-btn').forEach(btn => btn.classList.remove('selected'));
    if (t === 'number' && v !== null) {
        const btn = document.querySelector(`.number-btn[data-num="${v}"]`);
        if (btn) btn.classList.add('selected');
    } else {
        document.querySelectorAll(`.special-btn[data-bet="${t}"]`).forEach(btn => btn.classList.add('selected'));
    }
    showNotification(`Apuesta: ${formatBetType(t, v)} - $${a}`, true);
    return true;
}

function calculateWin(bet, n) {
    const c = getNumberColor(n), isEven = n !== 0 && n % 2 === 0, isOdd = n !== 0 && n % 2 === 1;
    switch(bet.type) {
        case 'number': return bet.value === n ? bet.amount * 35 : -bet.amount;
        case 'red': return c === 'red' ? bet.amount : -bet.amount;
        case 'black': return c === 'black' ? bet.amount : -bet.amount;
        case 'even': return isEven ? bet.amount : -bet.amount;
        case 'odd': return isOdd ? bet.amount : -bet.amount;
        case '1-18': return (n >= 1 && n <= 18) ? bet.amount : -bet.amount;
        case '19-36': return (n >= 19 && n <= 36) ? bet.amount : -bet.amount;
        case 'dozen1': return (n >= 1 && n <= 12) ? bet.amount * 2 : -bet.amount;
        case 'dozen2': return (n >= 13 && n <= 24) ? bet.amount * 2 : -bet.amount;
        case 'dozen3': return (n >= 25 && n <= 36) ? bet.amount * 2 : -bet.amount;
        default: return -bet.amount;
    }
}

function drawRoulette(highlightNumber = null) {
    if (!canvas || !ctx) {
        console.error("Canvas no disponible");
        return;
    }
    
    const size = canvas.width;
    const centerX = size / 2;
    const centerY = size / 2;
    const radius = size * 0.45;
    
    ctx.clearRect(0, 0, size, size);
    
    // Fondo exterior
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius + 10, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a1a';
    ctx.fill();
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.stroke();
    
    const angleStep = (Math.PI * 2) / rouletteNumbers.length;
    
    for (let i = 0; i < rouletteNumbers.length; i++) {
        const num = rouletteNumbers[i];
        const startAngle = i * angleStep + spinAngle;
        const endAngle = startAngle + angleStep;
        const color = getNumberColor(num);
        
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.fillStyle = color === 'red' ? '#cc0000' : color === 'green' ? '#008800' : '#111111';
        ctx.fill();
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 1;
        ctx.stroke();
        
        if (highlightNumber === num) {
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius + 5, startAngle, endAngle);
            ctx.fillStyle = 'rgba(255,215,0,0.3)';
            ctx.fill();
        }
        
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(startAngle + angleStep / 2);
        ctx.fillStyle = 'white';
        ctx.font = `bold ${Math.floor(size * 0.035)}px Arial`;
        ctx.shadowBlur = 0;
        ctx.fillText(num.toString(), radius - 25, 8);
        ctx.restore();
    }
    
    // Centro
    ctx.beginPath();
    ctx.arc(centerX, centerY, 25, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd700';
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = `bold ${Math.floor(size * 0.04)}px Arial`;
    ctx.fillText("🎰", centerX - 12, centerY + 8);
}

function spinRoulette() {
    if (!currentBet) { showNotification("¡Primero haz una apuesta!", false); return; }
    if (spinning) { showNotification("Espera a que termine el giro", false); return; }
    if (money <= 0) { showNotification("¡No tienes dinero! Inicia sesión o reinicia", false); return; }
    
    spinning = true;
    const spinBtn = document.getElementById('spinBtn');
    if (spinBtn) spinBtn.disabled = true;
    
    const targetIndex = Math.floor(Math.random() * rouletteNumbers.length);
    const resultNumber = rouletteNumbers[targetIndex];
    let giros = 0;
    const maxGiros = 150;
    
    const intervalo = setInterval(() => {
        spinAngle += 0.2;
        drawRoulette();
        giros++;
        
        if (giros > maxGiros) {
            clearInterval(intervalo);
            const ganancia = calculateWin(currentBet, resultNumber);
            const won = ganancia > 0;
            totalSpins = validarNumero(totalSpins + 1, 1);
            
            if (won) {
                let gananciaReal = validarNumero(ganancia, 0);
                money = validarNumero(money + gananciaReal, money);
                streak = validarNumero(streak + 1, 1);
                totalWins = validarNumero(totalWins + 1, 1);
                if (gananciaReal > bestWin) bestWin = validarNumero(gananciaReal, gananciaReal);
                addHistory(`🎉 GANASTE $${gananciaReal} apostando a ${formatBetType(currentBet.type, currentBet.value)} (Salió ${resultNumber})`, 'win');
                showNotification(`¡GANASTE $${gananciaReal}! Número ${resultNumber}`, true);
            } else {
                let perdida = validarNumero(currentBet.amount, 100);
                money = validarNumero(money - perdida, money);
                streak = 0;
                addHistory(`💔 PERDISTE $${perdida} (Salió ${resultNumber})`, 'loss');
                showNotification(`Perdiste $${perdida}... Salió el ${resultNumber}`, false);
            }
            
            lastNumber = resultNumber;
            const bgColor = getNumberColor(resultNumber) === 'red' ? '#cc0000' : getNumberColor(resultNumber) === 'green' ? '#008800' : '#333';
            const lastNumberSpan = document.getElementById('lastNumber');
            if (lastNumberSpan) {
                lastNumberSpan.innerHTML = `<span style="background:${bgColor};display:inline-block;padding:5px 15px;border-radius:20px;">${resultNumber}</span>`;
            }
            
            drawRoulette(resultNumber);
            currentBet = null;
            updateUI();
            document.querySelectorAll('.special-btn, .number-btn').forEach(btn => btn.classList.remove('selected'));
            spinning = false;
            if (spinBtn) spinBtn.disabled = false;
            
            if (money <= 0) {
                showNotification("💀 ¡BANCARROTA! Inicia sesión para recuperar o reinicia la página", false);
                if (spinBtn) spinBtn.disabled = true;
            }
            
            if (currentUser) saveOnline();
        }
    }, 15);
}

function investInBusiness(i) {
    const b = investments[i];
    if (money >= b.cost) {
        money = validarNumero(money - b.cost, money);
        b.invested += b.cost;
        b.lastCollect = Date.now();
        b.earned = 0;
        updateUI();
        addHistory(`📈 Invertiste $${b.cost} en ${b.name}`, 'event');
        showNotification(`¡Inversión realizada en ${b.name}!`, true);
    } else showNotification(`Necesitas $${b.cost} para invertir`, false);
}

function collectBusiness(i) {
    const b = investments[i];
    if (b.earned > 0) {
        let ganancia = validarNumero(b.earned, 0);
        money = validarNumero(money + ganancia, money);
        addHistory(`💰 Recolectaste $${Math.floor(ganancia)} de ${b.name}`, 'win');
        showNotification(`¡Ganaste $${Math.floor(ganancia)} de tu inversión!`, true);
        b.earned = 0;
        b.lastCollect = Date.now();
        updateUI();
    }
}

function updateInvestments() {
    const ahora = Date.now();
    investments.forEach(b => {
        if (b.invested > 0) {
            const minutos = (ahora - b.lastCollect) / 60000;
            b.earned = validarNumero(b.invested * b.rate * minutos, 0);
        }
    });
    updateUI();
}

function triggerRandomEvent() {
    const eventos = [
        { text: "🍀 ¡Bono de suerte! +$500", efecto: () => money = validarNumero(money + 500, money), tipo: 'win' },
        { text: "💸 Carterista en el casino. -$300", efecto: () => money = validarNumero(money - 300, money), tipo: 'loss' },
        { text: "🎰 ¡Mini jackpot! +$1000", efecto: () => money = validarNumero(money + 1000, money), tipo: 'win' },
        { text: "📉 Crisis en el mercado. -15%", efecto: () => money = validarNumero(money * 0.85, money), tipo: 'loss' },
        { text: "🏦 Patrocinador misterioso. +$750", efecto: () => money = validarNumero(money + 750, money), tipo: 'win' }
    ];
    const e = eventos[Math.floor(Math.random() * eventos.length)];
    e.efecto();
    addHistory(`🎲 EVENTO: ${e.text}`, e.tipo);
    showNotification(e.text, e.tipo === 'win');
    updateUI();
    if (money < 0) money = 0;
}

// ========== INICIALIZACIÓN DEL JUEGO ==========
function initGame() {
    console.log("Inicializando juego...");
    
    canvas = document.getElementById('rouletteCanvas');
    if (!canvas) {
        console.error("No se encontró el canvas");
        return;
    }
    
    ctx = canvas.getContext('2d');
    canvas.width = 500;
    canvas.height = 500;
    
    const grid = document.getElementById('numbersGrid');
    if (grid) {
        grid.innerHTML = '';
        for (let i = 0; i <= 36; i++) {
            const btn = document.createElement('button');
            btn.className = `number-btn ${getNumberColor(i)}`;
            btn.textContent = i;
            btn.setAttribute('data-num', i);
            btn.onclick = (function(num) { return function() { placeBet('number', num); }; })(i);
            grid.appendChild(btn);
        }
    }
    
    document.querySelectorAll('.special-btn').forEach(btn => {
        const betType = btn.getAttribute('data-bet');
        btn.onclick = () => placeBet(betType);
    });
    
    const spinButton = document.getElementById('spinBtn');
    if (spinButton) spinButton.onclick = spinRoulette;
    
    drawRoulette();
    updateUI();
    updateUIBasedOnUser();
    
    setInterval(() => {
        eventTimer--;
        const timerEl = document.getElementById('eventTimer');
        if (timerEl) timerEl.innerHTML = eventTimer;
        if (eventTimer <= 0) {
            triggerRandomEvent();
            eventTimer = 20 + Math.floor(Math.random() * 15);
        }
    }, 1000);
    
    setInterval(updateInvestments, 1000);
    setInterval(() => { updateRankingUI(); }, 15000);
    updateRankingUI();
    
    console.log("Juego inicializado correctamente");
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initGame);
} else {
    initGame();
}
